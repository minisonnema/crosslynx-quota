<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quota Overzicht - Crosslynx</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1e3a8a; color: white; }
        tr:hover { background-color: #f1f5f9; }
        .good { color: #22c55e; font-weight: bold; }
        .button { padding: 12px 24px; background: #1e3a8a; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .button:hover { background: #2e4a9e; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Quota Overzicht</h1>
    <p style="text-align:center; color:#666;">RW-Clients — Crosslynx</p>

    <div style="text-align:center; margin:25px 0;">
        <button class="button" onclick="loadQuota()">🔄 Gegevens Vernieuwen</button>
    </div>

    <table id="quotaTable">
        <thead>
            <tr>
                <th>Gebruiker</th>
                <th>Totaal Quota</th>
                <th>Verbruikt</th>
                <th>Over</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <p style="text-align:center; margin-top:30px; color:#666;">Laatste update: <span id="lastUpdate">—</span></p>
</div>

<script>
async function loadQuota() {
    const tbody = document.querySelector("#quotaTable tbody");
    tbody.innerHTML = "<tr><td colspan='5' style='text-align:center;padding:40px;'>⏳ Laden...</td></tr>";

    try {
        const response = await fetch('data.json');
        const users = await response.json();

        tbody.innerHTML = "";
        users.forEach(user => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><strong>${user.name}</strong></td>
                <td>${user.quota}</td>
                <td>${user.used}</td>
                <td class="good">${user.remaining}</td>
                <td class="good">✅ Actief</td>
            `;
            tbody.appendChild(row);
        });

        document.getElementById("lastUpdate").textContent = new Date().toLocaleTimeString('nl-NL');
    } catch (e) {
        tbody.innerHTML = `<tr><td colspan='5' style='color:red;text-align:center;'>Fout bij laden data.json</td></tr>`;
    }
}

window.onload = loadQuota;
</script>
</body>
</html>
